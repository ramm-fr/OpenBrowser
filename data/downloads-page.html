<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><title>Downloads</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-y:auto;background:#1a1a1a;color:#ccc;font-family:'Cantarell',-apple-system,sans-serif}
body{padding:32px 48px}
.header{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.header h1{font-size:24px;font-weight:300;color:#eee;flex:1}
.header button{background:#2a2a2a;color:#999;border:1px solid #333;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer}
.header button:hover{background:#333;color:#fff}
.empty{text-align:center;padding:80px 0;color:#444}
.empty svg{width:48px;height:48px;margin-bottom:16px;color:#333}
.empty p{font-size:14px;margin-bottom:4px}
.empty small{font-size:11px;color:#333}
.info{display:flex;align-items:center;gap:8px;margin-top:20px;padding:12px 16px;background:#222;border-radius:8px;border:1px solid #2a2a2a;font-size:11px;color:#555}
</style>
</head><body>
<div class="header">
<h1>Downloads</h1>
<button onclick="window.location.reload()">Refresh</button>
</div>
<div class="empty">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
<p>No downloads yet</p>
<small>Files you download will appear here</small>
</div>
<div class="info">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;flex-shrink:0"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="M2 10h20"/></svg>
Download location: ~/Downloads
</div>
</body></html>
