<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><title>Passwords</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-y:auto;background:#1a1a1a;color:#ccc;font-family:'Cantarell',-apple-system,sans-serif}
body{padding:32px 48px}
h1{font-size:24px;font-weight:300;color:#eee;margin-bottom:24px}
.section-title{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;margin-top:20px}
.add-form{background:#222;border:1px solid #2a2a2a;border-radius:12px;padding:16px;display:flex;gap:8px;margin-bottom:24px}
.add-form input{flex:1;background:#2a2a2a;border:1px solid #333;border-radius:6px;padding:8px 12px;color:#ccc;font-size:12px;outline:none}
.add-form input:focus{border-color:#4a9eff}
.add-form input::placeholder{color:#555}
.add-form button{background:#4a9eff;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:12px;cursor:pointer}
.add-form button:hover{background:#3a8eef}
.empty{text-align:center;padding:60px 0;color:#444}
.empty svg{width:48px;height:48px;margin-bottom:16px;color:#333}
.empty p{font-size:14px;margin-bottom:4px}
.empty small{font-size:11px;color:#333}
.info{margin-top:20px;padding:12px 16px;background:#222;border-radius:8px;border:1px solid #2a2a2a;font-size:11px;color:#555;text-align:center}
</style>
</head><body>
<h1>Passwords</h1>
<div class="section-title">Add Password</div>
<div class="add-form">
<input type="text" placeholder="Website">
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button>Save</button>
</div>
<div class="section-title">Saved Passwords</div>
<div class="empty">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
<p>No saved passwords</p>
<small>Credentials will auto-save when you log in to websites</small>
</div>
<div class="info">Passwords are stored locally with encryption</div>
</body></html>
